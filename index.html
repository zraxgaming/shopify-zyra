    <!-- Service Worker Registration (guarded — disabled in dev/preview/iframe) -->
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;

        var host = location.hostname;
        var isPreview =
          host.indexOf('id-preview--') === 0 ||
          host.indexOf('preview--') === 0 ||
          host === 'lovableproject.com' ||
          host.endsWith('.lovableproject.com') ||
          host === 'lovableproject-dev.com' ||
          host.endsWith('.lovableproject-dev.com') ||
          host === 'beta.lovable.dev' ||
          host.endsWith('.beta.lovable.dev');
        var inIframe = window.self !== window.top;
        var killSwitch = location.search.indexOf('sw=off') !== -1;

        if (isPreview || inIframe || killSwitch) {
          // Unregister any stale app service workers so the preview renders fresh code.
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (reg) {
              var url = (reg.active && reg.active.scriptURL) || '';
              if (url.indexOf('/sw.js') !== -1 || url.indexOf('/service-worker.js') !== -1) {
                reg.unregister();
              }
            });
          });
          return;
        }

        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js')
            .then(function (registration) {
              console.log('SW registered:', registration);
              registration.addEventListener('updatefound', function () {
                var newWorker = registration.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', function () {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    if (confirm('New version available! Reload to update?')) {
                      newWorker.postMessage({ action: 'skipWaiting' });
                      window.location.reload();
                    }
                  }
                });
              });
            })
            .catch(function (err) {
              console.log('SW registration failed:', err);
            });
        });

        navigator.serviceWorker.addEventListener('controllerchange', function () {
          window.location.reload();
        });
      })();
      
      // Handle app install prompt
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        // Show install button or banner
        console.log('App install prompt available');
      });
      
      // Track app launches
      if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('Launched as PWA');
        // Track PWA usage
      }
    </script>
