    <!-- Service Worker Registration -->
    <script>
      // Disable service worker when this HTML is rendered inside a Shopify theme
      // (Shopify themes manage their own caching and SW scope). We check for the
      // Liquid-injected `window.__SHOPIFY__` object and skip SW registration there.
      const runningInsideShopify = window.__SHOPIFY__ && window.__SHOPIFY__.theme_id;

      if (!runningInsideShopify && 'serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('SW registered: ', registration);

              // Check for updates
              registration.addEventListener('updatefound', function() {
                const newWorker = registration.installing;
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New content available, show update notification
                    if (confirm('New version available! Reload to update?')) {
                      newWorker.postMessage({ action: 'skipWaiting' });
                      window.location.reload();
                    }
                  }
                });
              });
            })
            .catch(function(registrationError) {
              console.log('SW registration failed: ', registrationError);
            });
        });

        // Listen for SW updates
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          window.location.reload();
        });
      } else if (runningInsideShopify) {
        console.log('Service worker registration skipped in Shopify theme context');
      }

      // Handle app install prompt (still safe to keep)
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        // Show install button or banner
        console.log('App install prompt available');
      });

      // Track app launches
      if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('Launched as PWA');
        // Track PWA usage
      }
    </script>
